server {
    listen 80 default_server;
    server_name _;

    root /var/www/kreblu;
    index index.php;

    # Max upload size (matches PHP config)
    client_max_body_size 128M;

    # Security headers
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-XSS-Protection "1; mode=block" always;

    # Block access to sensitive files
    location ~ /kb-config\.php$ { deny all; }
    location ~ /composer\.(json|lock)$ { deny all; }
    location ~ /docker { deny all; }
    location ~ /\.git { deny all; }
    location ~ /\.env { deny all; }

    # Block PHP execution in uploads directory
    location ~* /kb-content/uploads/.*\.php$ { deny all; }

    # Block direct access to logs
    location ~* /kb-content/logs/ { deny all; }

    # Serve static files directly, fall through to PHP for everything else
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # Serve admin static assets directly
    location /kb-admin/assets/ {
        try_files $uri =404;
    }

    # Serve uploaded media files directly
    location ^~ /kb-content/uploads/ {
        try_files $uri =404;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Admin routes
    location ^~ /kb-admin {
        rewrite ^ /index.php?$query_string last;
    }

    # API routes
    location /api {
        try_files $uri /index.php?$query_string;
    }

    # Installer routes
    location /kb-install {
        try_files $uri $uri/ /kb-install/index.php?$query_string;
    }

    # PHP-FPM handling
    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        include fastcgi_params;

        # Timeouts
        fastcgi_read_timeout 120;
        fastcgi_send_timeout 120;
    }

    # Cache static assets
    location ~* \.(css|js|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Deny dotfiles (except .well-known for Let's Encrypt)
    location ~ /\.(?!well-known) {
        deny all;
    }
}
