; Kreblu PHP Configuration (Development)
; Production values will differ - see docs/deployment.md

display_errors = On
error_reporting = E_ALL
log_errors = On
error_log = /var/www/kreblu/os-content/logs/php-error.log

memory_limit = 256M
max_execution_time = 120
max_input_vars = 5000
upload_max_filesize = 64M
post_max_size = 128M

; OPcache (enabled even in dev for realistic performance)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.max_accelerated_files = 10000
opcache.revalidate_freq = 0
opcache.validate_timestamps = 1

; Session
session.cookie_httponly = 1
session.cookie_samesite = Lax
session.use_strict_mode = 1

; Timezone (default, overridden by site settings)
date.timezone = UTC
